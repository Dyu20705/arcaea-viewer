name: Product or feature proposal
description: Propose an evidence-backed improvement aligned with the wiki-first MVP or an explicit post-MVP decision.
title: "[Proposal] "
labels: ["type:feature", "status:needs-decision"]
body:
  - type: markdown
    attributes:
      value: |
        Arcaea-Viewer's current public goal is a fast, accessible, source-aware static fan wiki. Accounts, production backend services, chart upload/playback, analytics, replay collection, audio previews, and redistribution of unlicensed assets are outside the Web MVP unless a later decision explicitly approves them.

        Describe the user problem first. A preferred implementation is useful, but it is not a substitute for evidence, scope boundaries, or acceptance criteria.

  - type: checkboxes
    id: preflight
    attributes:
      label: Preflight
      options:
        - label: I searched existing issues and the managed roadmap for an equivalent proposal.
          required: true
        - label: This proposal does not require publishing proprietary game files, copied third-party prose, secrets, or unlicensed media.
          required: true

  - type: textarea
    id: user-problem
    attributes:
      label: User problem
      description: Who is affected, what are they trying to do, and what currently prevents or slows them?
      placeholder: Ordinary players need to ... but currently ...
    validations:
      required: true

  - type: dropdown
    id: roadmap-fit
    attributes:
      label: Expected roadmap fit
      description: Choose the closest scope boundary; maintainers may reclassify it.
      options:
        - Current static wiki MVP
        - Post-MVP runtime, analytics, replay, or hosted platform
        - Documentation, contribution, or repository process
        - Not sure — requires product decision
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Primary area
      options:
        - Product or information architecture
        - UI/UX or accessibility
        - Frontend or browser behavior
        - Static data, provenance, or content workflow
        - Rust/WASM runtime prototype
        - Performance, security, SEO, PWA, or release
        - Community or contributor workflow
        - Not sure
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed outcome
      description: Describe observable behavior and the smallest useful end-to-end result. Avoid prescribing speculative infrastructure.
    validations:
      required: true

  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Acceptance criteria
      description: List objective, testable conditions that would prove the proposal is complete.
      placeholder: |
        - [ ] ...
        - [ ] ...
    validations:
      required: true

  - type: textarea
    id: data-legal
    attributes:
      label: Data, source, privacy, and legal impact
      description: Identify required records, sources, assets, permissions, personal data, hosted services, or external dependencies. Use N/A with a reason where appropriate.
    validations:
      required: true

  - type: textarea
    id: ux-quality
    attributes:
      label: UX and quality requirements
      description: Cover relevant loading, empty, error, offline, keyboard, responsive, zoom, reduced-motion, missing-media, performance, and rollback behavior. Use N/A with a reason where appropriate.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives and scope cuts
      description: Describe workarounds, smaller options, rejected approaches, and what can be deferred.
    validations:
      required: true

  - type: textarea
    id: evidence
    attributes:
      label: Supporting evidence
      description: Add official sources, user feedback, measurements, prototypes, related issues, or comparable products. Do not paste copyrighted content.
    validations:
      required: false

  - type: upload
    id: references
    attributes:
      label: Mockups or screenshots
      description: Optional visual evidence. Do not upload copied UI/assets as a proposed implementation template.
    validations:
      required: false
