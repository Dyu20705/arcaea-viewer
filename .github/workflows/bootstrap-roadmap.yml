name: Bootstrap web MVP roadmap

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "dry-run prints changes; apply writes labels, milestones, issues, and relations"
        required: true
        type: choice
        options:
          - dry-run
          - apply
        default: dry-run
      phase:
        description: "Manifest phase to process"
        required: true
        type: choice
        options:
          - all
          - roadmap
          - week-1
          - week-2
          - week-3
          - week-4
          - week-5
          - week-6
          - post-mvp
          - cleanup
        default: all
      start_date:
        description: "Roadmap start date used for milestone due dates (YYYY-MM-DD)"
        required: true
        type: string
        default: "2026-07-14"
      force_update:
        description: "Enforce manifest state and repair cross-phase relations"
        required: true
        type: boolean
        default: false
      close_superseded:
        description: "Allow issues marked superseded to be closed as not planned"
        required: true
        type: boolean
        default: false

permissions:
  contents: read
  issues: write

concurrency:
  group: bootstrap-web-mvp-roadmap
  cancel-in-progress: false

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout exact workflow revision
        uses: actions/checkout@v4

      - name: Validate roadmap manifests
        shell: bash
        run: |
          set -Eeuo pipefail
          jq -e '.schemaVersion == 1' roadmap/labels.json >/dev/null
          jq -e '.schemaVersion == 1' roadmap/milestones.json >/dev/null
          jq -e '.schemaVersion == 1 and (.includes | length > 0)' roadmap/issues.index.json >/dev/null

          while IFS= read -r manifest; do
            jq -e '.schemaVersion == 1 and (.issues | type == "array")' "roadmap/$manifest" >/dev/null
          done < <(jq -r '.includes[]' roadmap/issues.index.json)

          bash -n scripts/bootstrap-roadmap.sh
          bash scripts/bootstrap-roadmap.sh \
            --dry-run \
            --phase roadmap \
            --start-date "${{ inputs.start_date }}" \
            --repo "${{ github.repository }}" >/dev/null

      - name: Bootstrap roadmap
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        shell: bash
        run: |
          set -Eeuo pipefail

          args=(
            "--${{ inputs.mode }}"
            "--phase" "${{ inputs.phase }}"
            "--start-date" "${{ inputs.start_date }}"
          )

          if [[ "${{ inputs.force_update }}" == "true" ]]; then
            args+=("--force-update")
          fi

          if [[ "${{ inputs.close_superseded }}" == "true" ]]; then
            args+=("--close-superseded")
          fi

          bash scripts/bootstrap-roadmap.sh "${args[@]}"
