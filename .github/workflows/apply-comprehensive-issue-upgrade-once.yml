name: Apply comprehensive issue guidance once

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize
      - edited

permissions:
  contents: read
  issues: write

concurrency:
  group: apply-comprehensive-issue-guidance-once
  cancel-in-progress: false

jobs:
  apply:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.head_ref == 'ops/comprehensive-issue-upgrade' &&
      github.event.pull_request.title == 'chore(roadmap): apply comprehensive issue guidance'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      GH_TOKEN: ${{ github.token }}
      GITHUB_REPOSITORY: ${{ github.repository }}
      PR_NUMBER: ${{ github.event.pull_request.number }}
      ROADMAP_START_DATE: "2026-07-14"
      ROADMAP_SLEEP_SECONDS: "0.2"

    steps:
      - name: Checkout exact reviewed PR head
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false

      - name: Verify one-shot change scope
        shell: bash
        run: |
          set -Eeuo pipefail
          gh api --paginate \
            "repos/$GITHUB_REPOSITORY/pulls/$PR_NUMBER/files?per_page=100" |
            jq -s 'add // [] | map(.filename)' >changed-files.json

          jq -e '
            all(.[ ];
              test("^(roadmap/|scripts/bootstrap-roadmap[.]sh$|tests/roadmap/|docs/superpowers/|scripts/apply-comprehensive-issue-upgrade-once[.]sh$|[.]github/workflows/apply-comprehensive-issue-upgrade-once[.]yml$|[.]github/workflows/ci[.]yml$|[.]github/workflows/bootstrap-roadmap[.]yml$)")
            )
          ' changed-files.json >/dev/null

      - name: Apply and audit comprehensive issue guidance
        shell: bash
        run: bash scripts/apply-comprehensive-issue-upgrade-once.sh
