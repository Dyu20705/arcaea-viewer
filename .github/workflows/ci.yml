name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  check:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      - name: Rust format
        run: cargo fmt --check

      - name: Rust clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: Rust tests
        run: cargo test --workspace

      - name: Build WASM package
        run: pnpm run wasm:build

      - name: Frontend type check
        run: pnpm run lint

      - name: Frontend tests
        run: pnpm run test:web

      - name: Frontend production build
        run: pnpm run build

  roadmap-automation:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: read
    env:
      GH_TOKEN: ${{ github.token }}
      GITHUB_REPOSITORY: ${{ github.repository }}
      ROADMAP_SLEEP_SECONDS: "0"

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Roadmap unit and security tests
        shell: bash
        run: |
          set -Eeuo pipefail
          bash -n scripts/bootstrap-roadmap.sh
          bash -n tests/roadmap/test-bootstrap-roadmap.sh
          bash tests/roadmap/test-bootstrap-roadmap.sh

      - name: Live read-only roadmap plan
        shell: bash
        run: |
          set -Eeuo pipefail
          bash scripts/bootstrap-roadmap.sh \
            --dry-run \
            --phase all \
            --start-date 2026-07-14 \
            --repo "$GITHUB_REPOSITORY"
