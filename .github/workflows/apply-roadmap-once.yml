name: Apply roadmap once

on:
  push:
    branches:
      - main

permissions:
  contents: read
  issues: write

concurrency:
  group: apply-web-mvp-roadmap-once
  cancel-in-progress: false

jobs:
  apply:
    # The squash-merge commit title below is the one-time authorization token.
    if: ${{ github.event.head_commit.message == 'chore(roadmap): apply web MVP roadmap once' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      GH_TOKEN: ${{ github.token }}
      GITHUB_REPOSITORY: ${{ github.repository }}
      ROADMAP_SLEEP_SECONDS: "1"
    steps:
      - name: Checkout exact revision
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Apply full roadmap without destructive cleanup
        shell: bash
        run: |
          set -Eeuo pipefail
          bash scripts/bootstrap-roadmap.sh \
            --apply \
            --phase all \
            --start-date 2026-07-14
