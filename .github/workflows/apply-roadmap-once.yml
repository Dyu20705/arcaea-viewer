name: Apply roadmap once

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize

permissions:
  contents: read
  issues: write

concurrency:
  group: apply-web-mvp-roadmap-once
  cancel-in-progress: false

jobs:
  apply:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.head_ref == 'ops/execute-roadmap-apply' &&
      github.event.pull_request.title == 'chore(roadmap): execute web MVP roadmap apply'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      GH_TOKEN: ${{ github.token }}
      GITHUB_REPOSITORY: ${{ github.repository }}
      ROADMAP_SLEEP_SECONDS: "1"
    steps:
      - name: Checkout reviewed base revision
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          persist-credentials: false

      - name: Apply full roadmap without destructive cleanup
        shell: bash
        run: |
          set -Eeuo pipefail
          bash scripts/bootstrap-roadmap.sh \
            --apply \
            --phase all \
            --start-date 2026-07-14
