name: "Build and Push for Production"
on:
  push:
    tags:
      - "v*"
    paths:
      # - ".github/workflows/build-and-push.yaml"
      - "src/**"
      - "public/**"
      - ".env.production"
jobs:
  build-pages:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [24.x]
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{github.event.after}}
          repository: ${{github.repository}}
      - uses: pnpm/action-setup@v6
        name: Install pnpm
        with:
          version: 11.8.0
          run_install: false
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - name: Install packages
        run: pnpm install --frozen-lockfile
      - name: Build pages
        run: |
          pnpm build
        env:
          NODE_OPTIONS: --max_old_space_size=4096
      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: pages
          path: |
            build/
            nginx/
            Dockerfile.cloud
  build-docker:
    runs-on: ubuntu-latest
    needs: build-pages
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          name: pages
      - name: Rename Dockerfile
        run: mv Dockerfile.cloud Dockerfile
      - name: Setup buildx
        uses: docker/setup-buildx-action@v4
      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ secrets.DOCKER_DOMAIN }}/sekai-viewer
          tags: |
            type=semver,pattern={{version}}
      - name: Login to registry
        uses: docker/login-action@v4
        with:
          registry: ${{ secrets.DOCKER_DOMAIN }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Build and push
        id: docker_build
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
        env:
          DOCKER_BUILDKIT: 1
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{github.event.after}}
          repository: ${{github.repository}}
          path: repo
      - name: Update deployment.yaml, commit and push
        working-directory: ./repo
        run: |
          sed -i "s/${{ secrets.DOCKER_DOMAIN }}\/sekai-viewer:.*$/${{ secrets.DOCKER_DOMAIN }}\/sekai-viewer:${{ steps.meta.outputs.version }}/g" manifests/deployment.yaml
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"
          git add manifests/deployment.yaml
          git commit -m "Update deployment.yaml to version ${{ steps.meta.outputs.version }}"
          git push origin HEAD:deploy -f